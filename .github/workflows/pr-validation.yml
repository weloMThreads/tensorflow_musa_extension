            echo "Acquired GPU test lock: $lock_file" | tee -a "$BASELINE_LOG"

            bash -l -c '
              set -o pipefail
              [[ -e /home/runner/tf_test_model ]] || ln -s "$MODEL_ROOT" /home/runner/tf_test_model
              cd "$MODEL_ROOT/inference/metaGraph"
              MUSA_PINNED_FEED=1 \
              MUSA_PINNED_H2D_ON_COMPUTE_STREAM=1 \
              timeout 30m python musa_run_pb_graph.py \
                --spec "$SPEC_PATH" \
                --bs 32,128,256,1024 \
                --run_iters 30 \
                --out_root "$JOB_LOG_DIR/baseline-out" \
                --musa-plugin "$BASELINE_PLUGIN" 2>&1 | tee "$BASELINE_LOG"
            ' || baseline_exit=$?

            bash -l -c '
              set -o pipefail
              [[ -e /home/runner/tf_test_model ]] || ln -s "$MODEL_ROOT" /home/runner/tf_test_model
              cd "$MODEL_ROOT/inference/metaGraph"
              MUSA_PINNED_FEED=1 \
              MUSA_PINNED_H2D_ON_COMPUTE_STREAM=1 \
              timeout 30m python musa_run_pb_graph.py \
                --spec "$SPEC_PATH" \
                --bs 32,128,256,1024 \
                --run_iters 30 \
                --out_root "$JOB_LOG_DIR/current-out" \
                --musa-plugin "$CURRENT_PLUGIN" 2>&1 | tee "$CURRENT_LOG"
            ' || current_exit=$?
          else
            baseline_exit=1
            current_exit=1
          fi

          echo "baseline_exit=$baseline_exit" >> "$GITHUB_OUTPUT"
          echo "current_exit=$current_exit" >> "$GITHUB_OUTPUT"

      - name: Collect model 3 summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/bd-model3"
          BASELINE_LOG="$JOB_LOG_DIR/bd_model3_baseline.log"
          CURRENT_LOG="$JOB_LOG_DIR/bd_model3_current.log"
          SUMMARY_FILE="$RUNNER_TEMP/bd-model3.md"
          COMPARE_JSON="$RUNNER_TEMP/bd-model3-compare.json"
          DETAIL_FILE="$RUNNER_TEMP/bd-model3-details.md"
          STATUS="success"
          BASELINE_MS=""
          CURRENT_MS=""
          THRESHOLD_MS=""
          METRICS_SUMMARY=""
          METRICS_JSON=""
          BASELINE_REPORT=""
          CURRENT_REPORT=""
          RUNNER_NAME="${RUNNER_NAME:-unknown}"
          HOST_NAME="$(hostname)"
          HOST_IP="$(hostname -I 2>/dev/null | awk '{print $1}' || true)"
          HOST_SN="$(cat /sys/class/dmi/id/product_serial 2>/dev/null || true)"

          HOST_IP="${HOST_IP:-unavailable}"
          HOST_SN="${HOST_SN:-unavailable}"

          if [[ -f "$BASELINE_LOG" ]]; then
            REPORT_PATH="$(grep '^\[OK\] report=' "$BASELINE_LOG" | tail -1 | sed 's/^\[OK\] report=//' || true)"
            if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
              BASELINE_REPORT="$REPORT_PATH"
            fi
          fi

          if [[ -f "$CURRENT_LOG" ]]; then
            REPORT_PATH="$(grep '^\[OK\] report=' "$CURRENT_LOG" | tail -1 | sed 's/^\[OK\] report=//' || true)"
            if [[ -n "$REPORT_PATH" && -f "$REPORT_PATH" ]]; then
              CURRENT_REPORT="$REPORT_PATH"
            fi
          fi

          python3 - "$BASELINE_REPORT" "$CURRENT_REPORT" "$COMPARE_JSON" "$DETAIL_FILE" <<'PY'
          import json
          import os
          import sys

          baseline_report, current_report, compare_json, detail_file = sys.argv[1:5]
          THRESHOLD_RATIO = 1.05

          def load_report(path, label):
              if not path:
                  return None, [f"{label} report path missing"]
              if not os.path.isfile(path):
                  return None, [f"{label} report not found: {path}"]
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f), []
              except Exception as exc:
                  return None, [f"failed to load {label} report {path}: {exc}"]

          def collect_rows(report, label):
              rows = {}
              errors = []
              if report is None:
                  return rows, errors
              for item in report.get("average_time_summary", []):
                  bs = str(item.get("batch_size"))
                  if not bs or bs == "None":
                      errors.append(f"{label} report contains empty batch_size entry")
                      continue
                  if bs in rows:
                      errors.append(f"{label} report contains duplicate batch_size={bs}")
                      continue
                  rows[bs] = {
                      "status": item.get("status"),
                      "average_time_ms": item.get("trimmed_avg_ms")
                      if item.get("trimmed_avg_ms") is not None
                      else item.get("average_time_ms"),
                      "error_core": item.get("error_core"),
                  }
              if not rows:
                  errors.append(f"{label} report has no average_time_summary entries")
              return rows, errors

          baseline_data, errors = load_report(baseline_report, "baseline")
          current_data, cur_errors = load_report(current_report, "current")
          errors.extend(cur_errors)

          baseline_rows, cur_errors = collect_rows(baseline_data, "baseline")
          errors.extend(cur_errors)
          current_rows, cur_errors = collect_rows(current_data, "current")
          errors.extend(cur_errors)

          def sort_key(bs):
              try:
                  return (0, int(bs))
              except Exception:
                  return (1, str(bs))

          all_bs = sorted(set(baseline_rows) | set(current_rows), key=sort_key)
          result_rows = []
          baseline_parts = []
          current_parts = []
          threshold_parts = []
          metrics_parts = []
          overall_status = "success"

          for bs in all_bs:
              base = baseline_rows.get(bs)
              cur = current_rows.get(bs)
              row = {
                  "batch_size": bs,
                  "baseline_ms": None,
                  "current_ms": None,
                  "threshold_ms": None,
                  "result": "ok",
                  "detail": "",
              }

              if base is None:
                  row["result"] = "missing-baseline"
                  row["detail"] = "baseline report missing this batch size"
              elif cur is None:
                  row["result"] = "missing-current"
                  row["detail"] = "current report missing this batch size"
              elif base.get("status") != "ok" or base.get("average_time_ms") is None:
                  row["result"] = "baseline-failed"
                  row["detail"] = base.get("error_core") or f"baseline status={base.get('status')}"
              elif cur.get("status") != "ok" or cur.get("average_time_ms") is None:
                  row["result"] = "current-failed"
                  row["detail"] = cur.get("error_core") or f"current status={cur.get('status')}"
              else:
                  row["baseline_ms"] = float(base["average_time_ms"])
                  row["current_ms"] = float(cur["average_time_ms"])
                  row["threshold_ms"] = float(base["average_time_ms"]) * THRESHOLD_RATIO
                  if row["current_ms"] > row["threshold_ms"]:
                      row["result"] = "regressed"
                      row["detail"] = "current > baseline * 1.05"

              if row["result"] != "ok":
                  overall_status = "failure"

              result_rows.append(row)
              baseline_parts.append(f"bs{bs}={'%.4f' % row['baseline_ms'] if row['baseline_ms'] is not None else 'n/a'}")
              current_parts.append(f"bs{bs}={'%.4f' % row['current_ms'] if row['current_ms'] is not None else 'n/a'}")
              threshold_parts.append(f"bs{bs}={'%.4f' % row['threshold_ms'] if row['threshold_ms'] is not None else 'n/a'}")
              metrics_parts.append(
                  "bs{bs}: baseline={base}, current={cur}, threshold={thr}, result={result}".format(
                      bs=bs,
                      base="%.4f" % row["baseline_ms"] if row["baseline_ms"] is not None else "n/a",
                      cur="%.4f" % row["current_ms"] if row["current_ms"] is not None else "n/a",
                      thr="%.4f" % row["threshold_ms"] if row["threshold_ms"] is not None else "n/a",
                      result=row["result"],
                  )
              )

          if errors:
              overall_status = "failure"

          with open(detail_file, "w", encoding="utf-8") as f:
              f.write("| BS | Baseline (ms) | Current (ms) | Threshold (ms) | Result | Detail |\n")
              f.write("|----|---------------|--------------|----------------|--------|--------|\n")
              for row in result_rows:
                  f.write(
                      "| {bs} | {base} | {cur} | {thr} | {result} | {detail} |\n".format(
                          bs=row["batch_size"],
                          base="%.4f" % row["baseline_ms"] if row["baseline_ms"] is not None else "n/a",
                          cur="%.4f" % row["current_ms"] if row["current_ms"] is not None else "n/a",
                          thr="%.4f" % row["threshold_ms"] if row["threshold_ms"] is not None else "n/a",
                          result=row["result"],
                          detail=(row["detail"] or "").replace("|", "/"),
                      )
                  )
              if errors:
                  f.write("\nAdditional errors:\n")
                  for err in errors:
                      f.write(f"- {err}\n")

          payload = {
              "name": "BD Model 3",
              "kind": "batch_compare",
              "status": overall_status,
              "baseline_ms": ", ".join(baseline_parts) if baseline_parts else "",
              "current_ms": ", ".join(current_parts) if current_parts else "",
              "threshold_ms": ", ".join(threshold_parts) if threshold_parts else "",
              "metrics_summary": " ; ".join(metrics_parts) if metrics_parts else "",
              "rows": result_rows,
          }
          with open(compare_json, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

          STATUS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("status","failure"))' "$COMPARE_JSON")"
          BASELINE_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("baseline_ms",""))' "$COMPARE_JSON")"
          CURRENT_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("current_ms",""))' "$COMPARE_JSON")"
          THRESHOLD_MS="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("threshold_ms",""))' "$COMPARE_JSON")"
          METRICS_SUMMARY="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(data.get("metrics_summary",""))' "$COMPARE_JSON")"
          METRICS_JSON="$(python3 -c 'import json,sys; data=json.load(open(sys.argv[1], encoding="utf-8")); print(json.dumps(data, ensure_ascii=False, separators=(",", ":")))' "$COMPARE_JSON")"

          if [[ "${{ steps.run_perf.outputs.baseline_exit }}" != "0" || "${{ steps.run_perf.outputs.current_exit }}" != "0" ]]; then
            STATUS="failure"
          fi

          {
            echo "## BD Model 3"
            echo
            echo "- Status: $STATUS"
            echo "- Runner name: $RUNNER_NAME"
            echo "- Host name: $HOST_NAME"
            echo "- Host IP: $HOST_IP"
            echo "- Host SN: $HOST_SN"
            echo "- Log artifact: logs-bd-model3"
            echo "- Baseline: ${BASELINE_MS:-n/a}"
            echo "- Current: ${CURRENT_MS:-n/a}"
            echo "- Threshold: ${THRESHOLD_MS:-n/a}"
            echo
            echo "### Batch Size Comparison"
            cat "$DETAIL_FILE"
            echo
            echo "### Baseline log tail"
            echo '```text'
            if [[ -f "$BASELINE_LOG" ]]; then
              tail -20 "$BASELINE_LOG" || true
            else
              echo "baseline log not found"
            fi
            echo '```'
            echo
            echo "### Current log tail"
            echo '```text'
            if [[ -f "$CURRENT_LOG" ]]; then
              tail -20 "$CURRENT_LOG" || true
            else
              echo "current log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "baseline_ms=$BASELINE_MS" >> "$GITHUB_OUTPUT"
          echo "current_ms=$CURRENT_MS" >> "$GITHUB_OUTPUT"
          echo "threshold_ms=$THRESHOLD_MS" >> "$GITHUB_OUTPUT"
          echo "metrics_summary=$METRICS_SUMMARY" >> "$GITHUB_OUTPUT"
          {
            echo "metrics_json<<EOF"
            echo "$METRICS_JSON"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload model 3 summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-bd-model3
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload model 3 logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-bd-model3
          path: |
            ${{ needs.prepare_metadata.outputs.log_root }}/bd-model3/bd_model3_baseline.log
            ${{ needs.prepare_metadata.outputs.log_root }}/bd-model3/bd_model3_current.log
            ${{ needs.prepare_metadata.outputs.log_root }}/bd-model3/baseline-out
            ${{ needs.prepare_metadata.outputs.log_root }}/bd-model3/current-out
            ${{ runner.temp }}/bd-model3-details.md
            ${{ runner.temp }}/bd-model3-compare.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail job if model 3 regressed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  training:
    name: Training
    needs: [prepare_metadata, build_current]
    if: needs.prepare_metadata.result == 'success' && needs.build_current.result == 'success'
    runs-on: [self-hosted, musa-gpu]
    timeout-minutes: 210
    outputs:
      status: ${{ steps.collect.outputs.status }}
      summary_file: ${{ steps.collect.outputs.summary_file }}
    steps:
      - name: Download current plugin
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CURRENT_PLUGIN_ARTIFACT }}
          path: ${{ runner.temp }}/current-plugin

      - name: Run training tests
        id: run_training
        run: |
          set +e

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/training"
          LOG_FILE="$JOB_LOG_DIR/training_tests.log"
          ERROR_LOG_DIR="$JOB_LOG_DIR/error_logs"
          CURRENT_PLUGIN="$RUNNER_TEMP/current-plugin/libmusa_plugin.so"
          pr_training_models=(onetrans rankmixer tokenmixer-large)
          daily_training_models=(deepfm dien din dsin esmm fgcnn flen fwfm mmoe ple wukong xdeepfm)
          mkdir -p "$JOB_LOG_DIR"
          rm -f "$LOG_FILE"
          rm -rf "$ERROR_LOG_DIR"

          training_exit=0
          guard_failed=0
          guard_pattern="${GPU_GUARD_PATTERN:-[r]un_inference.py|[m]usa_run_pb_graph.py|[r]un_all_training_tests.py|[t]est_runner.py}"
          guard_timeout="${GPU_GUARD_TIMEOUT_SECONDS:-180}"
          lock_file="${GPU_LOCK_FILE:-/tmp/tensorflow_musa_ci_gpu.lock}"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            selected_training_models=("${daily_training_models[@]}")
            training_mode="daily-remainder"
          else
            selected_training_models=("${pr_training_models[@]}")
            training_mode="pr-smoke"
          fi
          TRAINING_MODELS="${selected_training_models[*]}"
          printf 'Training mode: %s\n' "$training_mode" | tee -a "$LOG_FILE"
          printf 'Selected models (%d): %s\n' "${#selected_training_models[@]}" "$TRAINING_MODELS" | tee -a "$LOG_FILE"

          start_ts="$(date +%s)"
          while true; do
            active_procs="$(ps -eo pid=,etimes=,cmd= | grep -E "$guard_pattern" || true)"
            if [[ -z "$active_procs" ]]; then
              break
            fi
            now_ts="$(date +%s)"
            if (( now_ts - start_ts >= guard_timeout )); then
              echo "Timed out waiting ${guard_timeout}s for previous GPU test processes to exit." | tee -a "$LOG_FILE"
              echo "$active_procs" | tee -a "$LOG_FILE"
              guard_failed=1
              break
            fi
            echo "Waiting for previous GPU test processes to exit before starting training:" | tee -a "$LOG_FILE"
            echo "$active_procs" | tee -a "$LOG_FILE"
            sleep 15
          done

          LIVE_TRAINING_WRAPPER="$RUNNER_TEMP/run_training_live.py"
          cat > "$LIVE_TRAINING_WRAPPER" <<'PY'
          import os
          import subprocess
          import selectors
          import sys
          import time

          sys.path.insert(0, os.getcwd())
          import run_all_training_tests as runner

          _real_run = subprocess.run


          def run_live(cmd, capture_output=False, text=False, cwd=None, env=None, timeout=None, **kwargs):
              if not capture_output:
                  return _real_run(cmd, capture_output=capture_output, text=text, cwd=cwd, env=env, timeout=timeout, **kwargs)

              effective_timeout = int(env.get("TRAINING_MODEL_TIMEOUT_SECONDS", "3600")) if env else 3600
              cmd = ["--musa-plugin" if arg == "--musa_plugin" else arg for arg in cmd]
              proc = subprocess.Popen(
                  cmd,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  bufsize=1,
                  cwd=cwd,
                  env=env,
              )

              lines = []
              start = time.monotonic()
              selector = selectors.DefaultSelector()
              selector.register(proc.stdout, selectors.EVENT_READ)

              try:
                  while True:
                      for key, _ in selector.select(timeout=0.2):
                          line = key.fileobj.readline()
                          if line:
                              lines.append(line)
                              sys.stdout.write(line)
                              sys.stdout.flush()

                      if proc.poll() is not None:
                          rest = proc.stdout.read()
                          if rest:
                              lines.append(rest)
                              sys.stdout.write(rest)
                              sys.stdout.flush()
                          break

                      if effective_timeout > 0 and time.monotonic() - start > effective_timeout:
                          proc.kill()
                          proc.wait()
                          timeout_msg = f"\n[ERROR] Model command timeout (>{effective_timeout}s)\n"
                          lines.append(timeout_msg)
                          sys.stdout.write(timeout_msg)
                          sys.stdout.flush()
                          return subprocess.CompletedProcess(cmd, 124, stdout="".join(lines), stderr="")
              finally:
                  selector.close()
                  if proc.stdout:
                      proc.stdout.close()

              return subprocess.CompletedProcess(cmd, proc.returncode, stdout="".join(lines), stderr="")


          runner.subprocess.run = run_live
          sys.exit(runner.main())
          PY

          export MODEL_ROOT LOG_FILE ERROR_LOG_DIR CURRENT_PLUGIN LIVE_TRAINING_WRAPPER TRAINING_MODELS
          if [[ "$guard_failed" == "0" ]]; then
            exec 9>"$lock_file"
            flock 9
            echo "Acquired GPU test lock: $lock_file" | tee -a "$LOG_FILE"

            timeout 180m bash -l -c '
              set -o pipefail
              cd "$MODEL_ROOT/training"
              mkdir -p "$ERROR_LOG_DIR"
              read -r -a training_models <<< "$TRAINING_MODELS"

              TRAINING_MODEL_TIMEOUT_SECONDS="${TRAINING_MODEL_TIMEOUT_SECONDS:-3600}" \
                PYTHONUNBUFFERED=1 \
                python -u "$LIVE_TRAINING_WRAPPER" \
                  --epochs 100 \
                  --log-dir "$ERROR_LOG_DIR" \
                  --models "${training_models[@]}" \
                  --musa-plugin "$CURRENT_PLUGIN" 2>&1 | tee "$LOG_FILE"
            ' || training_exit=$?
          else
            training_exit=1
          fi

          echo "training_exit=$training_exit" >> "$GITHUB_OUTPUT"

      - name: Collect training summary
        id: collect
        if: always()
        run: |
          set -euo pipefail

          JOB_LOG_DIR="${{ needs.prepare_metadata.outputs.log_root }}/training"
          LOG_FILE="$JOB_LOG_DIR/training_tests.log"
          SUMMARY_FILE="$RUNNER_TEMP/training.md"
          STATUS="success"

          if [[ "${{ steps.run_training.outputs.training_exit }}" != "0" ]]; then
            STATUS="failure"
          fi
          if [[ ! -f "$LOG_FILE" ]]; then
            STATUS="failure"
          elif grep -Eq "$EMPTY_TEST_RESULT_PATTERN" "$LOG_FILE" || grep -q '^\[FAIL\]' "$LOG_FILE" || grep -Eq '^失败:[[:space:]]*[1-9][0-9]*' "$LOG_FILE"; then
            STATUS="failure"
          fi

          {
            echo "## Training"
            echo
            echo "- Status: $STATUS"
            echo "- Log file: $LOG_FILE"
            echo
            echo '```text'
            if [[ -f "$LOG_FILE" ]]; then
              grep -E '^\[OK\]|^\[FAIL\]|^总计:|^成功:|^失败:|^  - ' "$LOG_FILE" || tail -80 "$LOG_FILE" || true
            else
              echo "training log not found"
            fi
            echo '```'
          } | tee "$SUMMARY_FILE"

          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload training summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-training
          path: ${{ steps.collect.outputs.summary_file }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload training logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-training
          path: |
            ${{ needs.prepare_metadata.outputs.log_root }}/training/training_tests.log
            ${{ needs.prepare_metadata.outputs.log_root }}/training/error_logs
          if-no-files-found: warn
          retention-days: 7

      - name: Fail job if training failed
        if: always() && steps.collect.outputs.status == 'failure'
        run: exit 1

  summary:
    name: Final Summary
    needs:
      - prepare_metadata
      - format
      - build_current
      - integration
      - build_baseline
      - t_perf
      - t_accuracy
      - bd_model1
      - bd_model2
      - bd_model3
      - training
    if: ${{ always() && !cancelled() }}
    runs-on: [self-hosted, musa-gpu]
    timeout-minutes: 10
    env:
      T_PERF_JSON: ${{ needs.t_perf.outputs.metrics_json || '' }}
      T_ACC_JSON: ${{ needs.t_accuracy.outputs.metrics_json || '' }}
      BD1_JSON: ${{ needs.bd_model1.outputs.metrics_json || '' }}
      BD2_JSON: ${{ needs.bd_model2.outputs.metrics_json || '' }}
      BD3_JSON: ${{ needs.bd_model3.outputs.metrics_json || '' }}
    steps:
      - name: Download summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          merge-multiple: true
          path: ${{ runner.temp }}/ci-summary

      - name: Generate final summary
        id: final_summary
        env:
          COMMIT_ID: ${{ needs.prepare_metadata.outputs.commit_id }}
          RUN_KIND: ${{ needs.prepare_metadata.outputs.run_kind }}
          RUN_ID: ${{ needs.prepare_metadata.outputs.run_id }}
          WORKFLOW_RUN_ID: ${{ needs.prepare_metadata.outputs.workflow_run_id || github.run_id }}
          WORKFLOW_RUN_ATTEMPT: ${{ needs.prepare_metadata.outputs.workflow_run_attempt || github.run_attempt }}
          HOST_NAME: ${{ needs.prepare_metadata.outputs.host_name || 'unavailable' }}
          HOST_IP: ${{ needs.prepare_metadata.outputs.host_ip || 'unavailable' }}
          HOST_SN: ${{ needs.prepare_metadata.outputs.host_sn || 'unavailable' }}
          BASELINE_SHA: ${{ needs.build_baseline.outputs.baseline_sha || 'unavailable' }}
          FORMAT_DISPLAY: ${{ needs.format.outputs.status == 'failure' && 'failure (non-blocking)' || needs.format.outputs.status || 'skipped' }}
          BUILD_CURRENT_STATUS: ${{ needs.build_current.outputs.status || 'skipped' }}
          INTEGRATION_STATUS: ${{ needs.integration.outputs.status || 'skipped' }}
          BUILD_BASELINE_STATUS: ${{ needs.build_baseline.outputs.status || 'skipped' }}
          T_PERF_STATUS: ${{ needs.t_perf.outputs.status || 'skipped' }}
          T_ACC_STATUS: ${{ needs.t_accuracy.outputs.status || 'skipped' }}
          BD1_STATUS: ${{ needs.bd_model1.outputs.status || 'skipped' }}
          BD2_STATUS: ${{ needs.bd_model2.outputs.status || 'skipped' }}
          BD3_STATUS: ${{ needs.bd_model3.outputs.status || 'skipped' }}
          TRAINING_STATUS: ${{ needs.training.outputs.status || 'skipped' }}
        run: |
          set -euo pipefail

          SUMMARY_DIR="$RUNNER_TEMP/final-summary"
          SUMMARY_FILE="$SUMMARY_DIR/final-summary.md"
          SUMMARY_JSON="$SUMMARY_DIR/final-summary.json"
          mkdir -p "$SUMMARY_DIR"
          FORMAT_STATUS="${{ needs.format.outputs.status || 'skipped' }}"
          FORMAT_RESULT="${{ needs.format.result }}"
          FORMAT_DISPLAY="$FORMAT_STATUS"
          BUILD_CURRENT_STATUS="${{ needs.build_current.outputs.status || 'skipped' }}"
          BUILD_CURRENT_RESULT="${{ needs.build_current.result }}"
          INTEGRATION_STATUS="${{ needs.integration.outputs.status || 'skipped' }}"
          INTEGRATION_RESULT="${{ needs.integration.result }}"
          BUILD_BASELINE_STATUS="${{ needs.build_baseline.outputs.status || 'skipped' }}"
          BUILD_BASELINE_RESULT="${{ needs.build_baseline.result }}"
          T_PERF_STATUS="${{ needs.t_perf.outputs.status || 'skipped' }}"
          T_PERF_RESULT="${{ needs.t_perf.result }}"
          T_ACC_STATUS="${{ needs.t_accuracy.outputs.status || 'skipped' }}"
          T_ACC_RESULT="${{ needs.t_accuracy.result }}"
          BD1_STATUS="${{ needs.bd_model1.outputs.status || 'skipped' }}"
          BD1_RESULT="${{ needs.bd_model1.result }}"
          BD2_STATUS="${{ needs.bd_model2.outputs.status || 'skipped' }}"
          BD2_RESULT="${{ needs.bd_model2.result }}"
          BD3_STATUS="${{ needs.bd_model3.outputs.status || 'skipped' }}"
          BD3_RESULT="${{ needs.bd_model3.result }}"
          TRAINING_STATUS="${{ needs.training.outputs.status || 'skipped' }}"
          TRAINING_RESULT="${{ needs.training.result }}"
          BASELINE_SHA="${{ needs.build_baseline.outputs.baseline_sha || 'unavailable' }}"
          PREPARE_METADATA_RESULT="${{ needs.prepare_metadata.result }}"

          if [[ "$FORMAT_STATUS" == "failure" ]]; then
            FORMAT_DISPLAY="failure (non-blocking)"
          fi

          python3 - "$SUMMARY_FILE" "$SUMMARY_JSON" <<'PY'
          import json
          import os
          import sys

          summary_file, summary_json = sys.argv[1:3]

          def load_json_env(name):
              raw = (os.environ.get(name) or "").strip()
              if not raw:
                  return None
              try:
                  return json.loads(raw)
              except json.JSONDecodeError:
                  return None

          def format_value(value):
              if value is None:
                  return "n/a"
              if isinstance(value, float):
                  return f"{value:.4f}"
              return str(value)

          commit_id = os.environ["COMMIT_ID"]
          run_kind = os.environ["RUN_KIND"]
          run_id = os.environ["RUN_ID"]
          workflow_run_id = os.environ["WORKFLOW_RUN_ID"]
          workflow_run_attempt = os.environ["WORKFLOW_RUN_ATTEMPT"]
          host_name = os.environ["HOST_NAME"]
          host_ip = os.environ["HOST_IP"]
          host_sn = os.environ["HOST_SN"]
          baseline_sha = os.environ["BASELINE_SHA"]

          jobs = [
              {"name": "Format", "result": os.environ["FORMAT_DISPLAY"], "blocking": "no"},
              {"name": "Build Current", "result": os.environ["BUILD_CURRENT_STATUS"], "blocking": "yes"},
              {"name": "Integration", "result": os.environ["INTEGRATION_STATUS"], "blocking": "yes"},
              {"name": "Build Baseline", "result": os.environ["BUILD_BASELINE_STATUS"], "blocking": "yes"},
              {"name": "T Performance", "result": os.environ["T_PERF_STATUS"], "blocking": "yes"},
              {"name": "T Accuracy", "result": os.environ["T_ACC_STATUS"], "blocking": "yes"},
              {"name": "BD Model 1", "result": os.environ["BD1_STATUS"], "blocking": "yes"},
              {"name": "BD Model 2", "result": os.environ["BD2_STATUS"], "blocking": "yes"},
              {"name": "BD Model 3", "result": os.environ["BD3_STATUS"], "blocking": "yes"},
              {"name": "Training", "result": os.environ["TRAINING_STATUS"], "blocking": "yes"},
          ]

          metrics = [
              load_json_env("T_PERF_JSON"),
              load_json_env("BD1_JSON"),
              load_json_env("BD2_JSON"),
              load_json_env("BD3_JSON"),
              load_json_env("T_ACC_JSON"),
          ]
          metrics = [item for item in metrics if item]

          payload = {
              "commit": commit_id,
              "run_kind": run_kind,
              "run_id": run_id,
              "workflow_run_id": workflow_run_id,
              "workflow_run_attempt": workflow_run_attempt,
              "host": {
                  "name": host_name,
                  "ip": host_ip,
                  "sn": host_sn,
              },
              "baseline_commit": baseline_sha,
              "jobs": jobs,
              "metrics": metrics,
          }

          lines = [
              "# CI Report",
              "",
              f"- Commit: {commit_id}",
              f"- Run kind: {run_kind}",
              f"- Run id: {run_id}",
              f"- Workflow run id: {workflow_run_id}",
              f"- Workflow run attempt: {workflow_run_attempt}",
              f"- Host name: {host_name}",
              f"- Host IP: {host_ip}",
              f"- Host SN: {host_sn}",
              f"- Baseline commit: {baseline_sha}",
              "",
              "## Job Status",
              "| Job | Result | Blocking |",
              "|-----|--------|----------|",
          ]

          for job in jobs:
              lines.append(f"| {job['name']} | {job['result']} | {job['blocking']} |")

          lines.extend(["", "## Key Summary"])

          for metric in metrics:
              name = metric.get("name", "Unknown Metric")
              kind = metric.get("kind", "unknown")
              lines.extend(["", f"### {name}"])

              if kind == "single":
                  lines.append(f"- Status: {metric.get('status', 'unknown')}")
                  lines.append(f"- Baseline: {metric.get('baseline_ms', 'n/a')} ms")
                  lines.append(f"- Current: {metric.get('current_ms', 'n/a')} ms")
                  lines.append(f"- Threshold: {metric.get('threshold_ms', 'n/a')} ms")
              elif kind == "batch_compare":
                  lines.append(f"- Status: {metric.get('status', 'unknown')}")
                  lines.append("| BS | Baseline (ms) | Current (ms) | Threshold (ms) | Result | Detail |")
                  lines.append("|----|---------------|--------------|----------------|--------|--------|")
                  for row in metric.get("rows", []):
                      lines.append(
                          "| {bs} | {base} | {cur} | {thr} | {result} | {detail} |".format(
                              bs=row.get("batch_size", "n/a"),
                              base=format_value(row.get("baseline_ms")),
                              cur=format_value(row.get("current_ms")),
                              thr=format_value(row.get("threshold_ms")),
                              result=row.get("result", "unknown"),
                              detail=str(row.get("detail", "")).replace("|", "/"),
                          )
                      )
              elif kind == "accuracy":
                  lines.append(f"- Status: {metric.get('status', 'unknown')}")
                  lines.append(f"- Current: {metric.get('current', 'n/a')}")
              else:
                  lines.append(f"- Raw metric: {json.dumps(metric, ensure_ascii=False)}")

          with open(summary_file, "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          with open(summary_json, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
          PY

          for file in \
            "$RUNNER_TEMP/ci-summary/prepare-metadata.md" \
            "$RUNNER_TEMP/ci-summary/format.md" \
            "$RUNNER_TEMP/ci-summary/build-current.md" \
            "$RUNNER_TEMP/ci-summary/integration.md" \
            "$RUNNER_TEMP/ci-summary/build-baseline.md" \
            "$RUNNER_TEMP/ci-summary/t-perf.md" \
            "$RUNNER_TEMP/ci-summary/t-accuracy.md" \
            "$RUNNER_TEMP/ci-summary/bd-model1.md" \
            "$RUNNER_TEMP/ci-summary/bd-model2.md" \
            "$RUNNER_TEMP/ci-summary/bd-model3.md" \
            "$RUNNER_TEMP/ci-summary/training.md"; do
            if [[ -f "$file" ]]; then
              echo >> "$SUMMARY_FILE"
              cat "$file" >> "$SUMMARY_FILE"
            fi
          done

          echo "===== Final CI Summary ====="
          cat "$SUMMARY_FILE"
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

          BLOCKING_FAILURE=0
          if [[ "$BUILD_CURRENT_STATUS" == "failure" || "$BUILD_CURRENT_RESULT" == "failure" || "$BUILD_CURRENT_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$INTEGRATION_STATUS" == "failure" || "$INTEGRATION_RESULT" == "failure" || "$INTEGRATION_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BUILD_BASELINE_STATUS" == "failure" || "$BUILD_BASELINE_RESULT" == "failure" || "$BUILD_BASELINE_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$T_PERF_STATUS" == "failure" || "$T_PERF_RESULT" == "failure" || "$T_PERF_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$T_ACC_STATUS" == "failure" || "$T_ACC_RESULT" == "failure" || "$T_ACC_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BD1_STATUS" == "failure" || "$BD1_RESULT" == "failure" || "$BD1_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BD2_STATUS" == "failure" || "$BD2_RESULT" == "failure" || "$BD2_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$BD3_STATUS" == "failure" || "$BD3_RESULT" == "failure" || "$BD3_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$TRAINING_STATUS" == "failure" || "$TRAINING_RESULT" == "failure" || "$TRAINING_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi
          if [[ "$PREPARE_METADATA_RESULT" == "failure" || "$PREPARE_METADATA_RESULT" == "skipped" ]]; then BLOCKING_FAILURE=1; fi

          if [[ "$BLOCKING_FAILURE" -ne 0 ]]; then
            FINAL_STATUS="failure"
          else
            FINAL_STATUS="success"
          fi

          echo "final_status=$FINAL_STATUS" >> "$GITHUB_OUTPUT"
          echo "summary_file=$SUMMARY_FILE" >> "$GITHUB_OUTPUT"
          echo "summary_json=$SUMMARY_JSON" >> "$GITHUB_OUTPUT"

      - name: Upload final summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-final
          path: |
            ${{ steps.final_summary.outputs.summary_file }}
            ${{ steps.final_summary.outputs.summary_json }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if blocking checks failed
        if: always() && steps.final_summary.outputs.final_status == 'failure'
        run: exit 1
